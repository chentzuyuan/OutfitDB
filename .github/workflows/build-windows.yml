name: build-windows

# Build a Windows .exe via PyInstaller on a free github-hosted Windows
# runner. Two trigger modes:
#   - workflow_dispatch  → manual button on the Actions tab (great for the
#     first proof-of-life build before we wire up tag-based releases).
#   - push: tags v*      → push a tag like v0.2.0 and the workflow
#     attaches the resulting zip to the matching GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      # Needed for action-gh-release to attach the artifact to a release.
      contents: write
    steps:
      - name: Check out repo (with the seed_profiles/Tester wardrobe)
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        # Pin pyinstaller >= 6.0 because earlier versions miss the
        # collect_all('xgboost') native dll fix the spec file relies on.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Build frozen .exe with PyInstaller
        # outfitdb.spec already has Windows-aware bundling: the
        # `if sys.platform == "darwin": app = BUNDLE(...)` block is
        # skipped here, so PyInstaller just produces the COLLECT folder
        # at dist/OutfitDB/ with OutfitDB.exe inside.
        run: pyinstaller outfitdb.spec --noconfirm

      - name: Inspect dist/ contents (debugging aid)
        shell: pwsh
        run: |
          Get-ChildItem dist -Recurse -Depth 1 | Select-Object FullName, Length

      - name: Read app version from app/version.py
        id: appver
        shell: pwsh
        # Source-of-truth for the package version is app/version.py;
        # echo it into a step output so subsequent steps can reference
        # ${{ steps.appver.outputs.version }} when shaping the asset
        # name. This keeps the Windows ZIP filename in lock-step with
        # the macOS DMG (OutfitDB-0.2.0.dmg / OutfitDB-0.2.0-windows.zip).
        run: |
          $line = (Select-String -Path app/version.py -Pattern '^APP_VERSION').Line
          $version = ($line -split '=')[1].Trim().Trim("'").Trim('"')
          Write-Host "Resolved APP_VERSION=$version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Zip the bundle
        shell: pwsh
        run: |
          $zip = "dist/OutfitDB-${{ steps.appver.outputs.version }}-windows.zip"
          Compress-Archive -Path dist/OutfitDB/* -DestinationPath $zip -Force
          Write-Host "Built $zip ($((Get-Item $zip).Length / 1MB) MB)"

      - name: Upload Actions artifact (always — even on workflow_dispatch)
        uses: actions/upload-artifact@v4
        with:
          name: OutfitDB-${{ steps.appver.outputs.version }}-windows
          path: dist/OutfitDB-${{ steps.appver.outputs.version }}-windows.zip
          retention-days: 30

      - name: Attach to GitHub Release (only when triggered by a tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OutfitDB-${{ steps.appver.outputs.version }}-windows.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
