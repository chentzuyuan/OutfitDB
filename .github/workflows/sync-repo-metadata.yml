name: sync-repo-metadata

# Treat .github/repo-metadata.json as the source of truth for the
# repo's "About" sidebar (description, homepage, topics). On every
# push that touches that file (or on manual workflow_dispatch), apply
# it to GitHub via REST. PR-friendly: contributors who want to update
# the description just edit the JSON instead of needing repo settings
# access.
on:
  push:
    branches: [main]
    paths:
      - '.github/repo-metadata.json'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      # repos.update() and replaceAllTopics() both need write access.
      contents: write
      metadata: write
    steps:
      - uses: actions/checkout@v4

      - name: Apply repo-metadata.json to the repo's About sidebar
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.github/repo-metadata.json';
            if (!fs.existsSync(path)) {
              core.info(`${path} not present; nothing to do.`);
              return;
            }
            const meta = JSON.parse(fs.readFileSync(path, 'utf8'));

            if (meta.description !== undefined || meta.homepage !== undefined) {
              await github.rest.repos.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                description: meta.description,
                homepage: meta.homepage,
              });
              core.info('Updated description / homepage.');
            }

            if (Array.isArray(meta.topics)) {
              await github.rest.repos.replaceAllTopics({
                owner: context.repo.owner,
                repo: context.repo.repo,
                names: meta.topics,
              });
              core.info(`Replaced topics: ${meta.topics.join(', ')}`);
            }
