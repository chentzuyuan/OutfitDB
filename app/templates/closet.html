{% extends "base.html" %}
{% block title_key %}page.title.closet{% endblock %}
{% block title %}{{ brand.app_name }} · Closet{% endblock %}
{% block content %}
<h1 data-i18n="closet.title">衣櫥</h1>

<div class="toolbar">
    <select id="categoryFilter">
        <option value="" data-i18n="closet.all_categories">全部類別</option>
        <option value="top">top</option>
        <option value="bottom">bottom</option>
        <option value="shoes">shoes</option>
        <option value="accessory">accessory</option>
        <option value="fullbody">fullbody</option>
    </select>
    <select id="colorFilter">
        <option value="" data-i18n="closet.all_colors">全部顏色</option>
    </select>
    <select id="materialFilter">
        <option value="" data-i18n="closet.all_materials">全部材質</option>
    </select>
    <select id="stateFilter">
        <option value="" data-i18n="closet.all_states">全部狀態</option>
        <option value="clean" data-i18n="closet.state_clean">clean</option>
        <option value="worn" data-i18n="closet.state_worn">worn (穿過, 還能再穿)</option>
        <option value="in_laundry" data-i18n="closet.state_dirty">in_laundry (待洗)</option>
        <option value="unavailable" data-i18n="closet.state_unavailable">unavailable</option>
    </select>
    <!-- Sort key — re-orders the grid in place, doesn't re-fetch from the server. -->
    <select id="sortMode">
        <option value="recent"    data-i18n="closet.sort.recent">最近新增</option>
        <option value="name"      data-i18n="closet.sort.name">名稱 A→Z</option>
        <option value="worn_desc" data-i18n="closet.sort.worn_desc">最常穿</option>
        <option value="worn_asc"  data-i18n="closet.sort.worn_asc">最少穿</option>
        <option value="rating"    data-i18n="closet.sort.rating">最高評分</option>
        <option value="coverage"  data-i18n="closet.sort.coverage">最常被推薦</option>
    </select>
    <button class="btn" id="refreshBtn" data-i18n="closet.refresh">重新整理</button>
    <button class="btn secondary" id="laundryBtn" data-i18n="closet.select_mode">多選</button>
</div>

<div id="grid" class="grid-cards"></div>

<!-- Floating action bar shown only in Laundry mode -->
<div id="laundryBar" class="laundry-bar" style="display:none;">
    <span id="laundryCount" class="laundry-count">0 件已選</span>
    <button class="btn secondary" id="laundrySelectAll" data-i18n="closet.select_all">全選</button>
    <button class="btn secondary" id="laundryCancel" data-i18n="closet.cancel">取消</button>
    <button class="btn secondary" id="laundryMarkUnavailable" data-i18n="closet.mark_unavailable_bulk">標為不可穿</button>
    <button class="btn secondary" id="laundryMarkAvailable" data-i18n="closet.mark_available_bulk">取回</button>
    <button class="btn warn" id="laundryMarkDirty" data-i18n="closet.mark_dirty_bulk">標為髒(待洗)</button>
    <button class="btn" id="laundrySubmit" data-i18n="closet.send_to_laundry">送洗(重置乾淨度)</button>
</div>

<!-- Right-click context menu -->
<div id="ctxMenu" class="ctx-menu" style="display:none;">
    <button data-action="mark_dirty" data-i18n="closet.menu_mark_dirty">標記為髒</button>
    <button data-action="mark_clean" data-i18n="closet.menu_mark_clean">標記為乾淨</button>
    <button data-action="edit_wpw" data-i18n="closet.menu_edit_wpw">編輯穿幾次要洗…</button>
    <button data-action="edit_composition" data-i18n="closet.menu_edit_composition">編輯材質 / 混紡比例…</button>
    <button data-action="update_image" data-i18n="closet.menu_update_image">更新圖片…</button>
    <hr/>
    <button data-action="delete" data-i18n="closet.menu_delete">刪除</button>
</div>
<!-- Hidden file input the right-click menu drives. Lives outside the
     menu so it survives the menu being hidden between click → file pick. -->
<input type="file" id="updateImageFile" accept="image/*" style="display:none;" />

<!-- Per-item stats modal — opens on a normal click on any item card.
     All charts are rendered with Chart.js (loaded from CDN below). -->
<div id="itemStatsModal" class="modal-overlay" style="display:none;">
    <div class="modal-card item-stats-modal">
        <div class="modal-head">
            <h3 id="isHeader" data-i18n="closet.item_stats_title">衣物統計</h3>
            <button class="modal-close" id="isClose">×</button>
        </div>
        <div id="isBody"><!-- filled by JS --></div>
    </div>
</div>

<style>
.item-stats-modal { max-width: 640px; max-height: 88vh; overflow-y: auto; }
.is-header-row {
    display: flex; gap: 12px; align-items: center; margin-bottom: 14px;
    padding-bottom: 12px; border-bottom: 1px solid #eee;
}
.is-header-row img {
    width: 80px; height: 80px; object-fit: cover; border-radius: 8px;
    background: #f5f5f5; flex-shrink: 0;
}
.is-header-meta { flex: 1; min-width: 0; }
.is-header-meta .is-name { font-size: 18px; font-weight: 600; color: #1a1a1a; }
.is-header-meta .is-tags { font-size: 12px; color: #777; margin-top: 4px; }
.is-tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.is-tile { background: #f5f5f5; border-radius: 8px; padding: 10px 8px; text-align: center; }
.is-tile-num { font-size: 22px; font-weight: 700; color: #11856B; line-height: 1.0; }
.is-tile-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
.is-section h4 { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }
/* Each chart lives inside a fixed-height wrapper div so Chart.js (which
   runs with maintainAspectRatio:false) has an explicit pixel height to
   fill — without this the canvas can collapse to 0px and look empty. */
.is-chart-box { position: relative; height: 220px; width: 100%; }
</style>
{% endblock %}
{% block scripts %}
<!-- Chart.js — used by the per-item stats modal -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const ctxMenu  = document.getElementById('ctxMenu');
const grid     = document.getElementById('grid');
const lBar     = document.getElementById('laundryBar');
let ctxTarget  = null;
let allItems   = [];          // last loaded list (for client-side filter on color/material)
let laundryMode = false;
const selected = new Set();

// ─── State badge helpers ────────────────────────────────────────────────
function cleanlinessBadge(it) {
    const wpw = it.wears_per_wash ?? 3;
    const n   = it.wear_count_since_wash ?? 0;
    const isEN = window.getLang && window.getLang() === 'en';
    if (it.state === 'unavailable') {
        return {label: isEN ? 'UNAVAILABLE' : '不可用', cls: 'badge-unavail', tip: ''};
    }
    if (it.state === 'in_laundry' || n >= wpw) {
        return {label: isEN ? `DIRTY ${n}/${wpw}` : `待洗 ${n}/${wpw}`, cls: 'badge-dirty', tip: 'Laundry 重置'};
    }
    if (n > 0) {
        return {label: `${n}/${wpw}`, cls: 'badge-worn', tip: 'used'};
    }
    return {label: `0/${wpw}`, cls: 'badge-clean', tip: 'clean'};
}

// Master copy of EVERY active item, fetched once on page load. Used to
// build the color / material dropdowns so the option set doesn't shrink
// when the user applies a filter (otherwise picking 'cashmere' would
// drop every other material from the dropdown).
let allItemsMaster = [];

// ─── Build dropdown options from the unfiltered master list ──────────
function populateDropdowns(items) {
    const colorSet = new Set(), matSet = new Set();
    for (const it of items) {
        for (const c of (it.colors || [])) colorSet.add(c.toLowerCase());
        // Primary material (mirrored from composition)
        if (it.material) matSet.add(it.material.toLowerCase());
        // Blend partners — so spandex / cashmere / etc. that only appear
        // as secondary in compositions still surface as filter options.
        for (const c of (it.composition || [])) {
            if (c && c.material) matSet.add(String(c.material).toLowerCase());
        }
    }
    const colorSel = document.getElementById('colorFilter');
    const matSel   = document.getElementById('materialFilter');
    const prevColor = colorSel.value, prevMat = matSel.value;
    // applyTranslations() only runs on initial page load, not on dynamic
    // option re-builds — so resolve the localized "All ___" label here
    // with hard-coded fallback in case i18n cache is stale.
    function tFb(key, zh, en) {
        const isEN = window.getLang && window.getLang() === 'en';
        const v = window.t ? window.t(key) : null;
        if (v && v !== key) return v;
        return isEN ? en : zh;
    }
    const allColorsLabel = tFb('closet.all_colors',    '全部顏色', 'All colors');
    const allMatsLabel   = tFb('closet.all_materials', '全部材質', 'All materials');
    colorSel.innerHTML = `<option value="">${allColorsLabel}</option>`;
    matSel.innerHTML   = `<option value="">${allMatsLabel}</option>`;
    [...colorSet].sort().forEach(c => {
        const o = document.createElement('option');
        o.value = c; o.textContent = c;
        colorSel.appendChild(o);
    });
    [...matSet].sort().forEach(m => {
        const o = document.createElement('option');
        o.value = m; o.textContent = m;
        matSel.appendChild(o);
    });
    colorSel.value = prevColor;
    matSel.value   = prevMat;
}

// Fetch every active item once and use it to populate the dropdowns.
// Re-called only when items are added / edited / deleted (not on filter).
async function loadMaster() {
    const res = await fetch('/items/');
    allItemsMaster = await res.json();
    populateDropdowns(allItemsMaster);
}

// ─── Load + render ─────────────────────────────────────────────────────
async function loadItems() {
    const params = new URLSearchParams();
    const cat   = document.getElementById('categoryFilter').value;
    const color = document.getElementById('colorFilter').value;
    const mat   = document.getElementById('materialFilter').value;
    const st    = document.getElementById('stateFilter').value;
    if (cat)   params.set('category', cat);
    if (color) params.set('color', color);
    if (mat)   params.set('material', mat);
    if (st)    params.set('state', st);
    const url = '/items/' + (params.toString() ? '?' + params : '');
    const res = await fetch(url);
    allItems = await res.json();
    // Dropdown options come from the master list — don't shrink them on filter.
    if (allItemsMaster.length === 0) populateDropdowns(allItems);
    renderGrid();
    // Filter changes shift which items are "visible" → the Select-all button
    // label depends on whether everything visible is selected, so refresh it.
    if (laundryMode) updateLaundryBar();
}

function formatComposition(it) {
    // Render the fabric blend as "cotton 40% · linen 60%", or just the
    // primary material when composition is unset (legacy items / 100%).
    if (Array.isArray(it.composition) && it.composition.length > 0) {
        return it.composition
            .map(c => `${c.material} ${c.pct}%`)
            .join(' · ');
    }
    return it.material || '—';
}

// ─── Client-side sort ────────────────────────────────────────────────
// Re-order the cards in place when the user picks a sort mode. Each
// comparator returns descending order; "name" / "worn_asc" invert as needed.
const CLOSET_SORTS = {
    recent:    (a, b) => (b.id ?? 0) - (a.id ?? 0),
    name:      (a, b) => String(a.name || '').localeCompare(String(b.name || '')),
    worn_desc: (a, b) => (b.worn_count       ?? 0) - (a.worn_count       ?? 0),
    worn_asc:  (a, b) => (a.worn_count       ?? 0) - (b.worn_count       ?? 0),
    // Items without a rating sink to the bottom (treated as -1).
    rating:    (a, b) => (b.average_rating   ?? -1) - (a.average_rating   ?? -1),
    coverage:  (a, b) => (b.coverage_count   ?? 0) - (a.coverage_count   ?? 0),
};

function renderGrid() {
    grid.innerHTML = '';
    const mode = document.getElementById('sortMode')?.value || 'recent';
    const cmp  = CLOSET_SORTS[mode] || CLOSET_SORTS.recent;
    const sorted = [...allItems].sort(cmp);
    for (const it of sorted) {
        const card = document.createElement('div');
        card.className = 'card' + (selected.has(it.id) ? ' card-selected' : '');
        card.dataset.itemId = it.id;
        const img = it.image_path
            ? `<img src="${it.image_path}" alt="${it.name}" />`
            : `<div class="noimg">${t('closet.no_image')}</div>`;
        const b = cleanlinessBadge(it);
        const checkbox = laundryMode
            ? `<div class="laundry-check ${selected.has(it.id) ? 'checked' : ''}"></div>`
            : '';
        card.innerHTML = `
            ${checkbox}
            <div class="img-wrap">
                ${img}
                <span class="cleanliness-badge ${b.cls}" title="${b.tip}">${b.label}</span>
            </div>
            <div class="meta">
                <div class="name">${it.name}</div>
                <div class="tags">${it.category} · ${it.layer_role} · ${it.thickness}</div>
                <div class="tags">${(it.colors || []).join(', ')}</div>
                <div class="tags composition">${formatComposition(it)}</div>
                <div class="tags">state: ${it.state ?? '—'}</div>
            </div>
        `;
        const target = { id: it.id, name: it.name, item: it };

        // In laundry mode, click toggles selection. Otherwise:
        //   - normal click → open per-item stats modal
        //   - right-click / long-press → action menu (existing)
        if (laundryMode) {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleSelect(it.id);
            });
        } else {
            card.addEventListener('click', (e) => {
                // Don't trigger if user happens to be selecting text inside the card
                if (window.getSelection && window.getSelection().toString()) return;
                openItemStats(it.id);
            });
            card.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                showMenu(e.clientX, e.clientY, target);
            });
            attachLongPress(card, target);
        }
        grid.appendChild(card);
    }
}

// ─── Laundry mode ──────────────────────────────────────────────────────
function toggleSelect(id) {
    if (selected.has(id)) selected.delete(id); else selected.add(id);
    updateLaundryBar();
    renderGrid();  // re-render to update card highlight
}

function updateLaundryBar() {
    const isEN = window.getLang && window.getLang() === 'en';
    document.getElementById('laundryCount').textContent =
        isEN ? `${selected.size} selected` : `已選 ${selected.size} 件`;
    document.getElementById('laundrySubmit').disabled = selected.size === 0;
    const dirtyBtn = document.getElementById('laundryMarkDirty');
    if (dirtyBtn) {
        dirtyBtn.disabled = selected.size === 0;
        // Defensive: if cached i18n.js is stale and missing the new key,
        // window.t() returns the key itself. Override with hard-coded
        // localized fallback so the button never shows "closet.mark_dirty_bulk"
        // raw to the user.
        const v = window.t ? window.t('closet.mark_dirty_bulk') : null;
        dirtyBtn.textContent = (v && v !== 'closet.mark_dirty_bulk')
            ? v
            : (isEN ? 'Mark dirty (queue)' : '標為髒(待洗)');
    }
    const submitBtn = document.getElementById('laundrySubmit');
    if (submitBtn) {
        const v = window.t ? window.t('closet.send_to_laundry') : null;
        submitBtn.textContent = (v && v !== 'closet.send_to_laundry')
            ? v
            : (isEN ? 'Send to laundry (reset)' : '送洗(重置乾淨度)');
    }
    const cancelBtn = document.getElementById('laundryCancel');
    if (cancelBtn) {
        const v = window.t ? window.t('closet.cancel') : null;
        cancelBtn.textContent = (v && v !== 'closet.cancel')
            ? v
            : (isEN ? 'Cancel' : '取消');
    }
    // Mark unavailable / Mark available buttons (state = unavailable / clean)
    const unavBtn = document.getElementById('laundryMarkUnavailable');
    if (unavBtn) {
        unavBtn.disabled = selected.size === 0;
        const v = window.t ? window.t('closet.mark_unavailable_bulk') : null;
        unavBtn.textContent = (v && v !== 'closet.mark_unavailable_bulk')
            ? v
            : (isEN ? 'Mark unavailable' : '標為不可穿');
    }
    const availBtn = document.getElementById('laundryMarkAvailable');
    if (availBtn) {
        availBtn.disabled = selected.size === 0;
        const v = window.t ? window.t('closet.mark_available_bulk') : null;
        availBtn.textContent = (v && v !== 'closet.mark_available_bulk')
            ? v
            : (isEN ? 'Mark available' : '取回');
    }
    // "Select all" button flips to "Deselect all" when every visible item
    // is already selected — same button, different action, less clutter.
    //
    // i18n quirk: when the user's cached i18n.js is older than the keys we
    // need, window.t(key) returns the key itself rather than throwing.
    // Detect that and fall back to a hard-coded localized string so the
    // button doesn't show "closet.select_all" raw to the user.
    function tWithFallback(key, fallbackZh, fallbackEn) {
        const v = window.t ? window.t(key) : null;
        if (v && v !== key) return v;
        return isEN ? fallbackEn : fallbackZh;
    }
    const selBtn = document.getElementById('laundrySelectAll');
    if (selBtn) {
        const allSelected = allItems.length > 0 &&
            allItems.every(it => selected.has(it.id));
        selBtn.textContent = allSelected
            ? tWithFallback('closet.deselect_all', '取消全選', 'Deselect all')
            : tWithFallback('closet.select_all',   '全選',     'Select all');
        selBtn.disabled = allItems.length === 0;
    }
}

document.getElementById('laundryBtn').addEventListener('click', () => {
    laundryMode = !laundryMode;
    selected.clear();
    lBar.style.display = laundryMode ? '' : 'none';
    document.getElementById('laundryBtn').classList.toggle('active', laundryMode);
    updateLaundryBar();
    renderGrid();
});

document.getElementById('laundryCancel').addEventListener('click', () => {
    laundryMode = false;
    selected.clear();
    lBar.style.display = 'none';
    document.getElementById('laundryBtn').classList.remove('active');
    renderGrid();
});

// Select-all toggles based on current state of `allItems` (= what the
// active filters are showing). So if you've filtered to "tops" the
// button selects all visible tops; switch filter to "bottoms" then
// click again, the bottoms get added to the existing selection.
document.getElementById('laundrySelectAll').addEventListener('click', () => {
    if (allItems.length === 0) return;
    const allSelected = allItems.every(it => selected.has(it.id));
    if (allSelected) {
        // Only remove the currently visible items from the selection,
        // not items hidden by filters (which the user already selected
        // in a previous filter pass).
        for (const it of allItems) selected.delete(it.id);
    } else {
        for (const it of allItems) selected.add(it.id);
    }
    updateLaundryBar();
    renderGrid();
});

document.getElementById('laundrySubmit').addEventListener('click', async () => {
    if (selected.size === 0) return;
    const r = await fetch('/items/laundry', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({item_ids: [...selected]}),
    });
    if (r.ok) {
        selected.clear();
        laundryMode = false;
        lBar.style.display = 'none';
        document.getElementById('laundryBtn').classList.remove('active');
        await loadItems();
    } else {
        alert(t('common.error_prefix') + ': ' + (await r.text()));
    }
});

// "Mark dirty" — flips state to in_laundry without resetting wear count.
// Use case: clothes are too dirty to wear today, but the user hasn't
// done laundry yet; they want the recommender to skip these items
// until laundry day.
document.getElementById('laundryMarkDirty').addEventListener('click', async () => {
    if (selected.size === 0) return;
    const isEN = window.getLang && window.getLang() === 'en';
    function tFb(key, fbZh, fbEn) {
        const v = window.t ? window.t(key) : null;
        if (v && v !== key) return v;
        return isEN ? fbEn : fbZh;
    }
    const confirmMsg = tFb(
        'closet.mark_dirty_confirm',
        `要把 ${selected.size} 件標為髒嗎？(可穿狀態 → 待洗,但不會重置乾淨度數字)`,
        `Mark ${selected.size} items as dirty? (becomes unwearable until laundry day, wear-count is not reset)`
    );
    if (!confirm(confirmMsg)) return;
    const r = await fetch('/items/dirty', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({item_ids: [...selected]}),
    });
    if (r.ok) {
        selected.clear();
        laundryMode = false;
        lBar.style.display = 'none';
        document.getElementById('laundryBtn').classList.remove('active');
        await loadItems();
    } else {
        alert(t('common.error_prefix') + ': ' + (await r.text()));
    }
});

// "Mark unavailable" — flips state to `unavailable` without touching
// wear-count. Use case: sent for repair, seasonal storage, lent out.
// Item disappears from recommendations until manually brought back.
async function bulkSetState(endpoint, confirmKey, fbZh, fbEn) {
    if (selected.size === 0) return;
    const isEN = window.getLang && window.getLang() === 'en';
    function tFb(key, zh, en) {
        const v = window.t ? window.t(key) : null;
        if (v && v !== key) return v;
        return isEN ? en : zh;
    }
    const n = selected.size;
    const confirmMsg = tFb(confirmKey, fbZh.replace('{n}', n), fbEn.replace('{n}', n));
    if (!confirm(confirmMsg)) return;
    const r = await fetch(endpoint, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({item_ids: [...selected]}),
    });
    if (r.ok) {
        selected.clear();
        laundryMode = false;
        lBar.style.display = 'none';
        document.getElementById('laundryBtn').classList.remove('active');
        await loadItems();
    } else {
        alert(t('common.error_prefix') + ': ' + (await r.text()));
    }
}

document.getElementById('laundryMarkUnavailable').addEventListener('click', () => {
    bulkSetState(
        '/items/unavailable',
        'closet.mark_unavailable_confirm',
        '把選的 {n} 件標為不可穿?(系統不會推薦,直到你手動取回)',
        'Mark {n} items as unavailable? (system will skip them until you bring them back)'
    );
});

document.getElementById('laundryMarkAvailable').addEventListener('click', () => {
    bulkSetState(
        '/items/available',
        'closet.mark_available_confirm',
        '把選的 {n} 件設回可穿(乾淨)?',
        'Bring {n} items back to clean?'
    );
});

// ─── Context menu helpers ──────────────────────────────────────────────
function showMenu(x, y, target) {
    ctxTarget = target;
    const padding = 8, menuW = 200, menuH = 180;
    const mx = Math.min(x, window.innerWidth  - menuW - padding);
    const my = Math.min(y, window.innerHeight - menuH - padding);
    ctxMenu.style.left = mx + 'px';
    ctxMenu.style.top  = my + 'px';
    ctxMenu.style.display = 'block';
}

function hideMenu() {
    ctxMenu.style.display = 'none';
    ctxTarget = null;
}

ctxMenu.querySelector('[data-action="mark_dirty"]').addEventListener('click', async () => {
    if (!ctxTarget) return;
    const { id, item } = ctxTarget;
    hideMenu();
    // Set wear_count to wears_per_wash → triggers in_laundry
    await fetch(`/items/${id}/cleanliness`, {
        method: 'PATCH', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({wear_count_since_wash: item.wears_per_wash, state: 'in_laundry'}),
    });
    await loadItems();
});

ctxMenu.querySelector('[data-action="mark_clean"]').addEventListener('click', async () => {
    if (!ctxTarget) return;
    const { id } = ctxTarget;
    hideMenu();
    await fetch(`/items/${id}/cleanliness`, {
        method: 'PATCH', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({wear_count_since_wash: 0, state: 'clean'}),
    });
    await loadItems();
});

ctxMenu.querySelector('[data-action="edit_wpw"]').addEventListener('click', async () => {
    if (!ctxTarget) return;
    const { id, item } = ctxTarget;
    hideMenu();
    const isEN = window.getLang && window.getLang() === 'en';
    const promptMsg = isEN
        ? `How many wears before "${item.name}" needs laundry?`
        : `「${item.name}」穿幾次要洗？`;
    const cur = item.wears_per_wash ?? 3;
    const v = prompt(promptMsg, String(cur));
    if (v == null) return;
    const n = parseInt(v, 10);
    if (isNaN(n) || n < 1) {
        alert(isEN ? 'Must be ≥ 1' : '必須 ≥ 1');
        return;
    }
    await fetch(`/items/${id}`, {
        method: 'PATCH', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({wears_per_wash: n}),
    });
    await loadItems();
});

// ─── Edit composition ────────────────────────────────────────────────
// Compact prompt-driven editor (no modal needed): user types a string like
// "cotton 40, linen 60" or just "cotton" (single material). We parse
// liberally and validate — sum to 100, each entry valid material.
ctxMenu.querySelector('[data-action="edit_composition"]').addEventListener('click', async () => {
    if (!ctxTarget) return;
    const { id, item } = ctxTarget;
    hideMenu();
    const isEN = window.getLang && window.getLang() === 'en';
    // Build an editable string from current composition / material
    const cur = Array.isArray(item.composition) && item.composition.length > 0
        ? item.composition.map(c => `${c.material} ${c.pct}`).join(', ')
        : (item.material || 'cotton');
    const promptMsg = isEN
        ? `Material for "${item.name}"\n\nSingle: cotton\nBlend: cotton 40, linen 60  (must sum to 100)`
        : `「${item.name}」的材質\n\n單一材質: cotton\n混紡: cotton 40, linen 60  (% 加總須 = 100)`;
    const raw = prompt(promptMsg, cur);
    if (raw == null) return;
    const trimmed = raw.trim();
    if (!trimmed) return;

    // Parse: split by comma, each token "material pct" or just "material"
    const tokens = trimmed.split(',').map(s => s.trim()).filter(Boolean);
    let payload;
    if (tokens.length === 1 && !/\d/.test(tokens[0])) {
        // Single material, no pct — clear the blend, set material
        payload = { material: tokens[0].toLowerCase(), composition: [] };
    } else {
        const entries = [];
        for (const tok of tokens) {
            const m = tok.match(/^([a-zA-Z]+)\s+(\d+)$/);
            if (!m) {
                alert(isEN
                    ? `Cannot parse "${tok}" — expected "material pct" e.g. "cotton 40"`
                    : `無法解析「${tok}」—— 格式應為「材質 百分比」例如「cotton 40」`);
                return;
            }
            entries.push({ material: m[1].toLowerCase(), pct: parseInt(m[2], 10) });
        }
        const sum = entries.reduce((a, e) => a + e.pct, 0);
        if (sum !== 100) {
            alert(isEN
                ? `Percentages sum to ${sum}, must be 100`
                : `百分比加總為 ${sum},必須等於 100`);
            return;
        }
        payload = { composition: entries };
    }
    const r = await fetch(`/items/${id}`, {
        method: 'PATCH', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload),
    });
    if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        alert((isEN ? 'Update failed: ' : '更新失敗: ') + (err.detail || r.status));
        return;
    }
    await loadItems();
});

// ─── Update image ────────────────────────────────────────────────────
// Used after CSV bulk-import (items have no image yet) or to replace
// a blurry / bad photo. We trigger the hidden <input type="file"> from
// the menu click and POST the chosen file to /items/{id}/image.
ctxMenu.querySelector('[data-action="update_image"]').addEventListener('click', () => {
    if (!ctxTarget) return;
    const { id } = ctxTarget;
    hideMenu();
    const fileInput = document.getElementById('updateImageFile');
    // Capture the target id at click time so the file-pick handler knows
    // which item to update — `ctxTarget` may shift if user opens another
    // menu while the picker is up.
    fileInput.dataset.targetId = String(id);
    fileInput.value = '';  // reset so re-picking the same filename re-fires `change`
    fileInput.click();
});

document.getElementById('updateImageFile').addEventListener('change', async (ev) => {
    const fileInput = ev.target;
    const targetId = fileInput.dataset.targetId;
    const file = fileInput.files[0];
    if (!targetId || !file) return;
    const isEN = window.getLang && window.getLang() === 'en';
    const fd = new FormData();
    fd.append('image', file, file.name);
    const r = await fetch(`/items/${targetId}/image`, { method: 'POST', body: fd });
    if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        alert((isEN ? 'Image update failed: ' : '圖片更新失敗: ') + (err.detail || r.status));
        return;
    }
    await loadItems();
});

ctxMenu.querySelector('[data-action="delete"]').addEventListener('click', async () => {
    if (!ctxTarget) return;
    const { id, name } = ctxTarget;
    hideMenu();
    const msg = (window.t ? window.t('closet.delete_confirm', { name }) : `Delete "${name}"?`);
    if (!confirm(msg)) return;
    const res = await fetch(`/items/${id}`, { method: 'DELETE' });
    if (res.ok) {
        loadItems();
    } else {
        const data = await res.json().catch(() => ({}));
        alert(t('common.delete_failed') + ': ' + (data.detail || res.status));
    }
});

document.addEventListener('click', (e) => {
    if (!ctxMenu.contains(e.target)) hideMenu();
});
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        hideMenu();
        if (laundryMode) document.getElementById('laundryCancel').click();
    }
});
window.addEventListener('scroll', hideMenu, { passive: true });

function attachLongPress(card, target) {
    let timer = null;
    let moved = false;
    const cancel = () => { if (timer) { clearTimeout(timer); timer = null; } };
    card.addEventListener('touchstart', (e) => {
        moved = false;
        const t = e.touches[0];
        timer = setTimeout(() => {
            if (!moved) showMenu(t.clientX, t.clientY, target);
        }, 500);
    }, { passive: true });
    card.addEventListener('touchmove', () => { moved = true; cancel(); }, { passive: true });
    card.addEventListener('touchend', cancel);
    card.addEventListener('touchcancel', cancel);
}

// ─── Filters ──────────────────────────────────────────────────────────
// Filters re-fetch from the server (the server applies filters in SQL).
['categoryFilter', 'colorFilter', 'materialFilter', 'stateFilter'].forEach(id => {
    document.getElementById(id).addEventListener('change', loadItems);
});
// Sort just re-renders the cached `allItems` — no server round-trip.
document.getElementById('sortMode').addEventListener('change', renderGrid);
document.getElementById('refreshBtn').addEventListener('click', async () => {
    // Hard refresh — items may have been edited/deleted; re-pull master too.
    await loadMaster();
    await loadItems();
});

// Initial boot: master first (for the dropdowns), then the (possibly filtered) grid.
(async () => {
    await loadMaster();
    await loadItems();
})();
// On language switch: re-localize the filter dropdowns ("All colors" etc.)
// AND re-render cards. Dropdowns aren't picked up by applyTranslations()
// because populateDropdowns() rebuilds them dynamically.
window.onLanguageChange = () => {
    populateDropdowns(allItemsMaster.length ? allItemsMaster : allItems);
    renderGrid();
    if (laundryMode) updateLaundryBar();  // refresh Select-all / Mark-dirty button text too
};

// ─── Per-item stats modal ─────────────────────────────────────────────
// Track active Chart.js instances so we can destroy them between opens
// (prevents canvas-reuse bugs when opening different items in succession).
let _isCharts = [];
function _disposeCharts() {
    _isCharts.forEach(c => { try { c.destroy(); } catch(_) {} });
    _isCharts = [];
}

async function openItemStats(itemId) {
    const r = await fetch(`/items/${itemId}/stats`);
    if (!r.ok) {
        showToast('failed to load stats');
        return;
    }
    const data = await r.json();
    const h = data.headline;

    // Header — image, name, category, state
    const imgSrc = h.image_path ? `/images/${h.image_path.split('/').pop()}` : '';
    const stateBadge = h.state ? `<span class="cleanliness-badge ${h.state}">${h.state}</span>` : '';

    document.getElementById('isHeader').textContent = h.name;

    const tile = (num, label) =>
        `<div class="is-tile">
            <div class="is-tile-num">${num ?? '—'}</div>
            <div class="is-tile-label">${label}</div>
        </div>`;

    const compositionBlock = data.composition
        ? `<div class="is-section"><h4>Composition</h4><div class="is-chart-box"><canvas id="isComp"></canvas></div></div>`
        : '';

    document.getElementById('isBody').innerHTML = `
        <div class="is-header-row">
            ${imgSrc ? `<img src="${imgSrc}" alt="">` : ''}
            <div class="is-header-meta">
                <div class="is-name">${h.name}</div>
                <div class="is-tags">${h.category ?? ''} ${stateBadge}</div>
            </div>
        </div>
        <div class="is-tiles">
            ${tile(h.worn_count, 'total worn')}
            ${tile(h.coverage_count, 'in outfits')}
            ${tile(h.average_rating !== null && h.average_rating !== undefined ? h.average_rating.toFixed(1) : '—', 'avg rating')}
            ${tile(h.days_since_worn, 'days since worn')}
        </div>
        <div class="is-section"><h4>Wear timeline (last 13 weeks)</h4><div class="is-chart-box"><canvas id="isTimeline"></canvas></div></div>
        <div class="is-section"><h4>Often paired with</h4><div class="is-chart-box" id="isCoocBox"><canvas id="isCooc"></canvas></div></div>
        ${compositionBlock}
    `;

    // Show modal first so canvases get sized; render charts after a paint
    document.getElementById('itemStatsModal').style.display = 'flex';
    requestAnimationFrame(() => {
        _disposeCharts();

        // Wear / coverage counts are always whole numbers — force integer
        // ticks so the y-axis doesn't show 0.0 / 0.1 / 0.2 fractional steps
        // when the actual values are tiny (0 or 1 wear events per week).
        const baseOpts = {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#666', font: { size: 10 } } },
                y: {
                    grid: { color: '#eee' },
                    ticks: { color: '#666', precision: 0, stepSize: 1 },
                    beginAtZero: true,
                },
            },
        };

        // Wear timeline — line chart over weeks. Each tick = one week, so
        // the natural ceiling per bucket is 7 (worn at most once per day).
        // Hard-capping the y-axis at 7 keeps the chart readable when most
        // weeks have 0–2 wears (otherwise a single 3-wear week would
        // squash the rest of the line).
        _isCharts.push(new Chart(document.getElementById('isTimeline'), {
            type: 'line',
            data: {
                labels: data.timeline.labels.map(d => d.slice(5)),  // MM-DD
                datasets: [{
                    data: data.timeline.values,
                    borderColor: '#11856B', backgroundColor: 'rgba(17,133,107,0.15)',
                    fill: true, tension: 0.25, pointRadius: 3,
                }],
            },
            options: {
                ...baseOpts,
                scales: {
                    ...baseOpts.scales,
                    y: { ...baseOpts.scales.y, max: 7 },
                },
            },
        }));

        // Co-occurrence — horizontal bar.
        // We DON'T spread baseOpts here: with indexAxis:'y' the value
        // and category axes swap, so we configure scales explicitly to
        // avoid the "0–1 default range with no bars" failure mode.
        if (data.co_occurrence.labels.length > 0) {
            _isCharts.push(new Chart(document.getElementById('isCooc'), {
                type: 'bar',
                data: {
                    labels: data.co_occurrence.labels,
                    datasets: [{
                        data: data.co_occurrence.values,
                        backgroundColor: '#E8B4BC',
                    }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: { color: '#eee' },
                            // co-occurrence counts are integers — clamp ticks
                            ticks: { color: '#666', precision: 0 },
                        },
                        y: {
                            grid: { display: false },
                            ticks: { color: '#666', font: { size: 11 } },
                        },
                    },
                },
            }));
        } else {
            document.getElementById('isCooc').replaceWith(
                Object.assign(document.createElement('div'), {
                    className: 'tags',
                    style: 'color:#999;padding:8px;',
                    textContent: 'Not yet paired in any outfit.',
                })
            );
        }

        // Composition — doughnut (only if present)
        if (data.composition) {
            _isCharts.push(new Chart(document.getElementById('isComp'), {
                type: 'doughnut',
                data: {
                    labels: data.composition.labels,
                    datasets: [{
                        data: data.composition.values,
                        backgroundColor: ['#11856B', '#E8B4BC', '#6B8E80', '#B85042', '#A7BEAE', '#F0C987'],
                    }],
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'right' } },
                },
            }));
        }
    });
}

function closeItemStats() {
    document.getElementById('itemStatsModal').style.display = 'none';
    _disposeCharts();
}
document.getElementById('isClose').addEventListener('click', closeItemStats);
document.getElementById('itemStatsModal').addEventListener('click', (e) => {
    // Click on the dimmed backdrop (but not inside the card) closes the modal
    if (e.target.id === 'itemStatsModal') closeItemStats();
});
</script>
